# ─── Nginx — TaskFlow v2 ──────────────────────────────────────────────────────
# Copie para: /etc/nginx/sites-available/taskmanager
# Ative com:  ln -s /etc/nginx/sites-available/taskmanager /etc/nginx/sites-enabled/
# Teste:      nginx -t
# Recarregue: systemctl reload nginx

# ─── Compressão gzip ──────────────────────────────────────────────────────────
gzip on;
gzip_types text/plain text/css application/javascript application/json
           text/xml application/xml image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

server {
    listen 80;
    server_name SEU_DOMINIO_OU_IP;

    # Redireciona HTTP → HTTPS (descomente após configurar SSL)
    # return 301 https://$host$request_uri;

    # Arquivos estáticos servidos diretamente pelo Nginx (mais rápido)
    location /static/ {
        alias /var/www/taskmanager/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Proxy para o Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Headers de segurança
        add_header X-Frame-Options           "SAMEORIGIN"         always;
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header X-XSS-Protection          "1; mode=block"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }
}

